<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400" role="img" aria-labelledby="title desc">
  <title id="title">Selected private voice and receptionist automation capabilities</title>
  <desc id="desc">A sanitized capability map showing voice and telephony input, agent logic, booking, follow-up, and persistence tools. Monitoring and staged delivery are cross-cutting safeguards.</desc>
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#eef6ed" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="800" height="400" fill="#171e19"/>
  <rect width="800" height="400" fill="url(#dots)"/>
  <rect x="3" y="3" width="794" height="394" fill="none" stroke="#000" stroke-width="6"/>

  <g font-family="Arial, Helvetica, sans-serif">
    <text x="32" y="46" font-size="21" font-weight="800" letter-spacing="1.2" fill="#ffe17c">SELECTED PRIVATE SYSTEMS · CAPABILITY MAP</text>
    <text x="32" y="96" font-size="38" font-weight="800" letter-spacing="-1" fill="#fff">VOICE + RECEPTIONIST AUTOMATION</text>

    <g transform="translate(32 134)" font-weight="800" text-anchor="middle" fill="#171e19">
      <rect x="0" y="0" width="156" height="100" fill="#fff" stroke="#000" stroke-width="3"/>
      <text x="78" y="44" font-size="30">VOICE</text>
      <text x="78" y="78" font-size="26">TELEPHONY</text>

      <rect x="204" y="0" width="174" height="100" fill="#ffe17c" stroke="#000" stroke-width="3"/>
      <text x="291" y="44" font-size="30">AGENT</text>
      <text x="291" y="78" font-size="30">LOGIC</text>

      <rect x="426" y="0" width="310" height="100" fill="#d7e6e2" stroke="#000" stroke-width="3"/>
      <text x="581" y="40" font-size="30">TOOLS</text>
      <text x="581" y="71" font-size="22">BOOKING · FOLLOW-UP</text>
      <text x="581" y="94" font-size="22">PERSISTENCE</text>

      <g stroke="#ffe17c" stroke-width="5" fill="#ffe17c">
        <line x1="156" y1="50" x2="194" y2="50"/><path d="M194 50l-14-9v18z"/>
        <line x1="378" y1="50" x2="416" y2="50"/><path d="M416 50l-14-9v18z"/>
      </g>
    </g>

    <g transform="translate(32 272)" font-weight="800" text-anchor="middle">
      <rect x="0" y="0" width="350" height="78" fill="#eef6ed" stroke="#000" stroke-width="3"/>
      <text x="175" y="48" font-size="28" fill="#171e19">MONITORING + HEALTH</text>
      <rect x="386" y="0" width="350" height="78" fill="#ffe17c" stroke="#000" stroke-width="3"/>
      <text x="561" y="33" font-size="26" fill="#171e19">STAGED DELIVERY</text>
      <text x="561" y="62" font-size="26" fill="#171e19">BACKUPS + RECOVERY</text>
    </g>
  </g>
</svg>
