<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GitHub profile proof cards</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 32px; display: grid; gap: 32px; background: #cfd7d0; font-family: Arial, Helvetica, sans-serif; color: #171e19; }
    .card { position: relative; width: 1280px; height: 420px; overflow: hidden; border: 6px solid #000; }
    .copy { position: absolute; inset: 0 auto 0 0; width: 720px; padding: 44px 50px; z-index: 2; }
    .kicker { margin: 0 0 18px; font-size: 28px; font-weight: 800; letter-spacing: 2px; }
    h1 { margin: 0 0 20px; max-width: 700px; font-size: 66px; line-height: .93; letter-spacing: -2px; }
    .proof { margin: 0 0 12px; font-size: 40px; line-height: 1.08; font-weight: 800; }
    .boundary { display: inline-block; margin-top: 10px; padding: 9px 14px; border: 3px solid #000; font-size: 30px; font-weight: 800; }
    .visual { position: absolute; top: 24px; right: 32px; bottom: 24px; width: 500px; overflow: hidden; border: 4px solid #000; background: #171e19; box-shadow: 10px 10px 0 #000; }
    .carrito { background: #ffe17c; }
    .carrito .visual { width: 196px; right: 70px; }
    .carrito .visual img { width: 100%; height: auto; transform: translateY(-2px); }
    .carrito .terminal { position: absolute; right: 298px; top: 62px; width: 330px; padding: 28px; background: #171e19; color: #fff; border: 4px solid #000; box-shadow: 8px 8px 0 #000; font: 700 38px/1.28 ui-monospace, SFMono-Regular, Menlo, monospace; }
    .terminal .ok { color: #ffe17c; }
    .transcribe { background: #eef6ed; }
    .transcribe .copy { width: 585px; }
    .transcribe .visual { width: 620px; }
    .transcribe .visual img { width: 100%; height: 100%; object-fit: cover; object-position: 22% 20%; }
    .transcribe h1 { font-size: 62px; }
    .transcribe .proof { max-width: 510px; font-size: 40px; }
  </style>
</head>
<body>
  <section class="card carrito" id="carrito-card">
    <div class="copy">
      <p class="kicker">PUBLIC SYSTEM · GO</p>
      <h1>GUARDED CART ACTIONS</h1>
      <p class="proof">Validate → write → read back</p>
      <span class="boundary">LOCAL MOCK RUN · NO CHECKOUT</span>
    </div>
    <div class="terminal" aria-label="Verified Carrito mock-run output">
      <div><span class="ok">READ-BACK</span></div>
      <div>VERIFIED</div>
      <div>€2.90 ≤ €10</div>
    </div>
    <div class="visual">
      <img src="./carrito-demo-mobile.png" alt="Carrito generated family cooking plan">
    </div>
  </section>

  <section class="card transcribe" id="transcribe-card">
    <div class="copy">
      <p class="kicker">PUBLIC SYSTEM · PYTHON</p>
      <h1>LONG-AUDIO TRANSCRIPTION</h1>
      <p class="proof">Speaker handoff<br>Text · SRT</p>
      <span class="boundary">REAL UI · SANITIZED DATA</span>
    </div>
    <div class="visual">
      <img src="./transcribe-result.svg" alt="Transcribe result screen with sanitized demo transcript">
    </div>
  </section>
</body>
</html>
